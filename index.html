<!DOCTYPE html>
<html lang="es" data-bs-theme="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobotCap | Sistema de Reciclaje Inteligente</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --robot-green: #198754;
            --robot-light-green: #2ecc71;
        }
        body { background-color: #0b0f13; color: #e9ecef; }
        .navbar { border-bottom: 2px solid var(--robot-green); background-color: #1a1d20 !important; }
        .btn-green { background-color: var(--robot-green); color: white; border: none; }
        .btn-green:hover { background-color: var(--robot-light-green); }
        .card { background-color: #1a1d20; border: 1px solid #2d3238; border-radius: 15px; }
        .card-stat { border-top: 4px solid var(--robot-green); }
        .text-green { color: var(--robot-light-green) !important; }
        .chart-container { position: relative; height: 250px; }
        
        /* Estilo para ocultar cosas de Admin si no está logueado */
        .admin-only { display: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-green" href="#">🤖 RobotCap</a>
        <div class="d-flex align-items-center">
            <span id="user-role" class="badge bg-secondary me-2">Invitado</span>
            <button class="btn btn-outline-success btn-sm" id="btn-login">Acceder</button>
            <button class="btn btn-outline-danger btn-sm d-none" id="btn-logout">Salir</button>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card card-stat p-3 text-center">
                <div class="text-muted small">TAPITAS TOTALES</div>
                <div class="display-6 fw-bold text-green" id="stat-total-tapitas">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-stat p-3 text-center">
                <div class="text-muted small">PESO RECOLECTADO</div>
                <div class="display-6 fw-bold" id="stat-total-peso">0.0g</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-stat p-3">
                <div class="text-muted small text-center mb-2">NIVEL DE LLENADO</div>
                <div class="progress" style="height: 25px;">
                    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%">0%</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-8">
            <div class="card p-3 h-100">
                <h6 class="text-muted mb-3">Recolección Diaria (Tapitas)</h6>
                <div class="chart-container"><canvas id="chartLineal"></canvas></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 h-100">
                <h6 class="text-muted mb-3">Capacidad del Robot</h6>
                <div class="chart-container"><canvas id="chartDona"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <h6 class="text-muted mb-3">Comparativa de Pesos (g)</h6>
                <div class="chart-container"><canvas id="chartBarras"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <h6 class="text-muted mb-3 text-center">Panel de Control (Admin)</h6>
                <div class="d-flex justify-content-around align-items-center h-100 py-4">
                    <button class="btn btn-danger admin-only" id="btn-vaciar">Vaciar Contenedor</button>
                    <p class="text-muted" id="admin-msg">Inicie sesión como administrador para ver controles.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://seqhkezofckiqsbxztwo.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Nirtr7MckkR8ecaPCnjTFw_FHxXLmaA";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Objetos de las gráficas
    let chartLine, chartDoughnut, chartBar;

    async function init() {
        await cargarDatos();
        configurarAuth();
        configurarRealtime();
    }

    async function cargarDatos() {
        const { data, error } = await _supabase.from('resumen_diario').select('*').order('fecha', { ascending: false }).limit(7);
        if (error) return;

        const fechas = data.map(d => d.fecha).reverse();
        const tapitas = data.map(d => d.total_tapitas).reverse();
        const pesos = data.map(d => d.total_gramos).reverse();

        actualizarGraficas(fechas, tapitas, pesos);
        
        // Totales en tarjetas
        document.getElementById('stat-total-tapitas').innerText = tapitas.reduce((a,b) => a+b, 0);
        document.getElementById('stat-total-peso').innerText = pesos.reduce((a,b) => a+b, 0).toFixed(1) + "g";
    }

    function actualizarGraficas(fechas, tapitas, pesos) {
        const commonOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };

        // 1. Gráfica Lineal (Tendencia)
        if (chartLine) chartLine.destroy();
        chartLine = new Chart(document.getElementById('chartLineal'), {
            type: 'line',
            data: { labels: fechas, datasets: [{ data: tapitas, borderColor: '#2ecc71', tension: 0.3, fill: true, backgroundColor: 'rgba(25, 135, 84, 0.1)' }] },
            options: commonOptions
        });

        // 2. Gráfica de Barras (Peso)
        if (chartBar) chartBar.destroy();
        chartBar = new Chart(document.getElementById('chartBarras'), {
            type: 'bar',
            data: { labels: fechas, datasets: [{ data: pesos, backgroundColor: '#198754' }] },
            options: commonOptions
        });

        // 3. Gráfica de Dona (Capacidad - Simulada con último nivel)
        const ultimoNivel = 65; // Ejemplo: Deberías traer el nivel real
        if (chartDoughnut) chartDoughnut.destroy();
        chartDoughnut = new Chart(document.getElementById('chartDona'), {
            type: 'doughnut',
            data: { 
                labels: ['Lleno', 'Libre'], 
                datasets: [{ data: [ultimoNivel, 100-ultimoNivel], backgroundColor: ['#198754', '#2d3238'], borderWidth: 0 }] 
            },
            options: { cutout: '80%', ...commonOptions }
        });
    }

    // Lógica Simple de Roles (Simulada para demostración inicial)
    function configurarAuth() {
        document.getElementById('btn-login').onclick = () => {
            const pass = prompt("Ingrese clave de Admin:");
            if(pass === "robot123") { // Lógica simple para tu prototipo
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('admin-msg').style.display = 'none';
                document.getElementById('user-role').innerText = "Administrador";
                document.getElementById('user-role').className = "badge bg-success me-2";
                document.getElementById('btn-login').classList.add('d-none');
                document.getElementById('btn-logout').classList.remove('d-none');
            }
        };

        document.getElementById('btn-logout').onclick = () => location.reload();
    }

    function configurarRealtime() {
        _supabase.channel('custom-insert-channel').on('postgres_changes', 
        { event: 'INSERT', schema: 'public', table: 'eventos_insercion' }, 
        () => cargarDatos()).subscribe();
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
